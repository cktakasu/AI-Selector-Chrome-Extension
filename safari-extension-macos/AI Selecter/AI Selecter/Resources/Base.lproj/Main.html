<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'">

    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

    <link rel="stylesheet" href="../Style.css">
    <script src="../Script.js" defer></script>
</head>
<body>
    <img src="../Icon.png" width="128" height="128" alt="AI Selecter Icon">
    <h1 class="state-unknown">AI Selecter を使い始める</h1>
    <p class="state-unknown">Safari の設定で拡張機能を有効にしてください。</p>
    
    <p class="state-on"><strong>拡張機能は有効です</strong><br>Safari でご利用いただけます。</p>
    
    <p class="state-off"><strong>拡張機能がオフになっています</strong><br>Safari の設定で有効にしてください。</p>
    
    <button class="open-preferences">設定を開いて Safari を終了する…</button>
</body>
</html>
